# processor-service/src/main/resources/META-INF/microprofile-config.properties
mp.messaging.connector.smallrye-kafka.bootstrap.servers=localhost:9092

mp.messaging.incoming.ordersCreatedIn.connector=smallrye-kafka
mp.messaging.incoming.ordersCreatedIn.topic=orders.created
mp.messaging.incoming.ordersCreatedIn.group.id=order-processor-group
mp.messaging.incoming.ordersCreatedIn.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.ordersCreatedIn.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.ordersCreatedIn.failure-strategy=dead-letter-queue
mp.messaging.incoming.ordersCreatedIn.dead-letter-queue.topic=orders.dlq
mp.messaging.incoming.ordersCreatedIn.dead-letter-queue.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.ordersCreatedIn.dead-letter-queue.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Optional: match topic partitions
mp.messaging.incoming.ordersCreatedIn.partitions=3

mp.messaging.outgoing.ordersProcessed.connector=smallrye-kafka
mp.messaging.outgoing.ordersProcessed.topic=orders.processed
mp.messaging.outgoing.ordersProcessed.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.ordersProcessed.value.serializer=org.apache.kafka.common.serialization.StringSerializer